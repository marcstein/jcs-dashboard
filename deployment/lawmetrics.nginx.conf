# =============================================================================
# LawMetrics.ai — Nginx Configuration
#
# Wildcard subdomain routing for multi-tenant law firm dashboards.
# Each firm gets {subdomain}.lawmetrics.ai (e.g. jcs.lawmetrics.ai).
#
# Three server blocks:
#   1. HTTP catch-all → redirect to HTTPS
#   2. HTTPS wildcard subdomains → proxy to FastAPI on port 3000
#   3. HTTPS www/apex → marketing site (static or Cloudflare Pages)
#
# Prerequisites:
#   - Wildcard DNS: *.lawmetrics.ai → droplet IP
#   - Wildcard SSL: certbot --dns-digitalocean -d lawmetrics.ai -d '*.lawmetrics.ai'
#
# Install:
#   sudo cp deployment/lawmetrics.nginx.conf /etc/nginx/sites-available/lawmetrics.ai
#   sudo ln -sf /etc/nginx/sites-available/lawmetrics.ai /etc/nginx/sites-enabled/lawmetrics.ai
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
# =============================================================================

# Upstream: FastAPI dashboard
upstream lawmetrics_dashboard {
    server 127.0.0.1:3000;
    keepalive 32;
}

# ---------------------------------------------------------------------------
# 1. HTTP → HTTPS redirect (all hostnames)
# ---------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name lawmetrics.ai *.lawmetrics.ai;

    # Certbot HTTP-01 challenge (for renewal)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------------------------------------------------------------------------
# 2. HTTPS — Wildcard subdomains (firm dashboards + app.lawmetrics.ai)
#
#    jcs.lawmetrics.ai   → FastAPI (middleware resolves firm_id from Host)
#    app.lawmetrics.ai   → FastAPI (generic login with firm_id field)
#    smith.lawmetrics.ai → FastAPI (middleware resolves firm_id from Host)
# ---------------------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ~^(?<subdomain>[a-z0-9-]+)\.lawmetrics\.ai$;

    # Wildcard SSL certificate
    ssl_certificate /etc/letsencrypt/live/lawmetrics.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lawmetrics.ai/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Logging
    access_log /var/log/nginx/lawmetrics-access.log;
    error_log /var/log/nginx/lawmetrics-error.log;

    # Static files (served directly, bypass FastAPI)
    location /static/ {
        alias /opt/jcs-mycase/dashboard/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Health check (no logging)
    location /health {
        proxy_pass http://lawmetrics_dashboard;
        access_log off;
    }

    # Proxy to FastAPI dashboard
    location / {
        proxy_pass http://lawmetrics_dashboard;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }

    # Rate limit login endpoint
    location /login {
        limit_req zone=login burst=20 nodelay;
        proxy_pass http://lawmetrics_dashboard;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ---------------------------------------------------------------------------
# 3. HTTPS — Marketing site (www.lawmetrics.ai and lawmetrics.ai apex)
# ---------------------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.lawmetrics.ai lawmetrics.ai;

    ssl_certificate /etc/letsencrypt/live/lawmetrics.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lawmetrics.ai/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    access_log /var/log/nginx/marketing-access.log;
    error_log /var/log/nginx/marketing-error.log;

    # Apex → www redirect
    if ($host = "lawmetrics.ai") {
        return 301 https://www.lawmetrics.ai$request_uri;
    }

    # Convenience redirects
    location = /login {
        return 301 https://app.lawmetrics.ai/login;
    }
    location = /app {
        return 301 https://app.lawmetrics.ai/;
    }

    # Static marketing site
    # Option A: Local static files
    root /var/www/lawmetrics-marketing;
    index index.html;
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Option B: Proxy to Cloudflare Pages (uncomment if using external hosting)
    # location / {
    #     proxy_pass https://lawmetrics-marketing.pages.dev;
    #     proxy_ssl_server_name on;
    #     proxy_set_header Host lawmetrics-marketing.pages.dev;
    # }
}

# ---------------------------------------------------------------------------
# Rate limiting zone (defined in http{} block or nginx.conf)
# Add this to /etc/nginx/nginx.conf inside the http{} block:
#   limit_req_zone $binary_remote_addr zone=login:10m rate=5r/s;
# ---------------------------------------------------------------------------
