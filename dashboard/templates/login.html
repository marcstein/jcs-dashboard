{% extends "base.html" %}

{% block title %}Login - LawMetrics.ai{% endblock %}

{% block content %}
<div class="login-container">
    <div class="login-box">
        <h1>LawMetrics.ai</h1>
        <p class="login-subtitle">Legal AI Driven Analytics & Automation</p>

        {% if error %}
        <div class="alert alert-error">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/login" class="login-form">
            <div class="form-group">
                <label for="firm_id">Firm ID</label>
                <input type="text" id="firm_id" name="firm_id" required autofocus
                       placeholder="e.g. jcs_law"
                       value="{{ firm_id or '' }}">
            </div>
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required
                       value="{{ username or '' }}">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Login</button>
        </form>
    </div>
</div>
{% endblock %}
