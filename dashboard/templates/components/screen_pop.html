<!-- Screen Pop Component — included from base.html via SSE for caller ID -->

<!-- Screen Pop Container (hidden by default) -->
<div id="screen-pop-container" style="
    position: fixed;
    top: 80px;
    right: -420px;
    width: 400px;
    max-height: calc(100vh - 100px);
    z-index: 10000;
    transition: right 0.3s ease-in-out;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
">
    <div id="screen-pop-card" style="
        background: #ffffff;
        border-radius: 12px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.18), 0 2px 8px rgba(0,0,0,0.08);
        border: 1px solid #e2e8f0;
        overflow: hidden;
    ">
        <!-- Header -->
        <div id="pop-header" style="
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            color: white;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        ">
            <div style="display: flex; align-items: center; gap: 10px;">
                <div style="
                    width: 36px; height: 36px;
                    background: rgba(255,255,255,0.2);
                    border-radius: 50%;
                    display: flex; align-items: center; justify-content: center;
                    font-size: 18px;
                    animation: pulse-ring 1.5s ease-in-out infinite;
                ">
                    &#128222;
                </div>
                <div>
                    <div style="font-weight: 600; font-size: 14px;">Incoming Call</div>
                    <div id="pop-phone" style="font-size: 13px; opacity: 0.9;"></div>
                </div>
            </div>
            <button onclick="dismissScreenPop()" style="
                background: rgba(255,255,255,0.2);
                border: none;
                color: white;
                width: 28px; height: 28px;
                border-radius: 50%;
                cursor: pointer;
                font-size: 16px;
                display: flex; align-items: center; justify-content: center;
            ">&times;</button>
        </div>

        <!-- Unknown Caller (shown when not matched) -->
        <div id="pop-unknown" style="display: none; padding: 24px 20px; text-align: center;">
            <div style="font-size: 48px; margin-bottom: 8px;">&#128100;</div>
            <div style="font-size: 18px; font-weight: 600; color: #1e293b;">Unknown Caller</div>
            <div id="pop-unknown-number" style="color: #64748b; margin-top: 4px;"></div>
        </div>

        <!-- Matched Client Content -->
        <div id="pop-matched" style="display: none;">
            <!-- Client Name -->
            <div style="padding: 16px 20px; border-bottom: 1px solid #f1f5f9;">
                <div style="display: flex; align-items: center; gap: 12px;">
                    <div id="pop-avatar" style="
                        width: 44px; height: 44px;
                        background: #e0e7ff;
                        color: #3730a3;
                        border-radius: 50%;
                        display: flex; align-items: center; justify-content: center;
                        font-weight: 700; font-size: 18px;
                    "></div>
                    <div>
                        <div id="pop-name" style="font-size: 18px; font-weight: 600; color: #1e293b;"></div>
                        <div id="pop-email" style="font-size: 13px; color: #64748b;"></div>
                    </div>
                </div>
            </div>

            <!-- Active Cases -->
            <div id="pop-cases" style="padding: 12px 20px; border-bottom: 1px solid #f1f5f9;">
                <div style="font-size: 12px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px;">
                    Active Cases
                </div>
                <div id="pop-cases-list"></div>
            </div>

            <!-- Financial Summary -->
            <div id="pop-financial" style="padding: 12px 20px; display: flex; gap: 16px;">
                <div style="flex: 1;">
                    <div style="font-size: 11px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px;">Last Payment</div>
                    <div id="pop-last-payment" style="font-size: 14px; font-weight: 600; color: #1e293b; margin-top: 2px;"></div>
                </div>
                <div style="flex: 1;">
                    <div style="font-size: 11px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px;">Balance Due</div>
                    <div id="pop-balance" style="font-size: 14px; font-weight: 600; margin-top: 2px;"></div>
                </div>
            </div>
        </div>

        <!-- Actions -->
        <div style="padding: 12px 20px; border-top: 1px solid #f1f5f9; display: flex; gap: 8px;">
            <a id="pop-mycase-link" href="#" target="_blank" style="
                flex: 1;
                background: #2563eb;
                color: white;
                border: none;
                padding: 10px;
                border-radius: 8px;
                font-size: 13px;
                font-weight: 600;
                cursor: pointer;
                text-align: center;
                text-decoration: none;
                display: none;
            ">Open in MyCase</a>
            <button onclick="dismissScreenPop()" style="
                flex: 1;
                background: #f1f5f9;
                color: #475569;
                border: none;
                padding: 10px;
                border-radius: 8px;
                font-size: 13px;
                font-weight: 600;
                cursor: pointer;
            ">Dismiss</button>
        </div>
    </div>
</div>

<style>
@keyframes pulse-ring {
    0% { box-shadow: 0 0 0 0 rgba(255,255,255,0.4); }
    70% { box-shadow: 0 0 0 8px rgba(255,255,255,0); }
    100% { box-shadow: 0 0 0 0 rgba(255,255,255,0); }
}

#screen-pop-container.visible {
    right: 20px !important;
}

.pop-case-item {
    padding: 8px 0;
    border-bottom: 1px solid #f8fafc;
}
.pop-case-item:last-child {
    border-bottom: none;
}
.pop-case-name {
    font-size: 14px;
    font-weight: 600;
    color: #1e293b;
}
.pop-case-detail {
    font-size: 12px;
    color: #64748b;
    margin-top: 2px;
}
.pop-case-phase {
    display: inline-block;
    background: #e0e7ff;
    color: #3730a3;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 10px;
    margin-top: 4px;
}
</style>

<script>
// --- Screen Pop SSE Connection ---

let screenPopEventSource = null;
let screenPopDismissTimer = null;
const SCREEN_POP_TIMEOUT_MS = 30000; // Auto-dismiss after 30 seconds

function initScreenPopSSE() {
    if (screenPopEventSource) {
        screenPopEventSource.close();
    }

    screenPopEventSource = new EventSource('/api/phone/events/stream');

    screenPopEventSource.addEventListener('system', function(e) {
        const data = JSON.parse(e.data);
        console.log('[ScreenPop] SSE connected:', data);
    });

    screenPopEventSource.addEventListener('screen_pop', function(e) {
        const data = JSON.parse(e.data);
        console.log('[ScreenPop] Received:', data);
        showScreenPop(data);
    });

    screenPopEventSource.onerror = function(e) {
        console.warn('[ScreenPop] SSE connection error, will auto-reconnect');
    };
}

function showScreenPop(data) {
    const container = document.getElementById('screen-pop-container');
    const popPhone = document.getElementById('pop-phone');

    // Set phone number
    popPhone.textContent = data.caller_number || 'Unknown';

    if (data.matched) {
        // --- Matched Client ---
        document.getElementById('pop-unknown').style.display = 'none';
        document.getElementById('pop-matched').style.display = 'block';

        // Avatar initials
        const name = data.client_name || 'Unknown';
        const initials = name.split(' ').map(w => w[0]).join('').substring(0, 2).toUpperCase();
        document.getElementById('pop-avatar').textContent = initials;

        // Name and email
        document.getElementById('pop-name').textContent = name;
        document.getElementById('pop-email').textContent = data.client_email || '';

        // Cases
        const casesList = document.getElementById('pop-cases-list');
        casesList.innerHTML = '';
        if (data.cases && data.cases.length > 0) {
            data.cases.forEach(function(c) {
                const div = document.createElement('div');
                div.className = 'pop-case-item';
                div.innerHTML = `
                    <div class="pop-case-name">${escapeHtml(c.name || '')}</div>
                    <div class="pop-case-detail">
                        ${escapeHtml(c.case_number || '')} &middot; ${escapeHtml(c.practice_area || '')}
                        &middot; ${escapeHtml(c.lead_attorney || '')}
                    </div>
                    <span class="pop-case-phase">${escapeHtml(c.phase || 'Unknown')}</span>
                `;
                casesList.appendChild(div);
            });
            document.getElementById('pop-cases').style.display = 'block';
        } else {
            document.getElementById('pop-cases').style.display = 'none';
        }

        // Financial info
        const role = document.body.dataset.role || '';
        if (role === 'attorney') {
            document.getElementById('pop-financial').style.display = 'none';
        } else {
            document.getElementById('pop-financial').style.display = 'flex';
            const lp = data.last_payment;
            document.getElementById('pop-last-payment').textContent =
                lp ? `$${lp.amount.toLocaleString()} on ${lp.date}` : 'None';

            const balEl = document.getElementById('pop-balance');
            const bal = data.balance_due || 0;
            balEl.textContent = '$' + bal.toLocaleString(undefined, {minimumFractionDigits: 2});
            balEl.style.color = bal > 0 ? '#dc2626' : '#16a34a';
        }

        // MyCase deep link
        const mycaseLink = document.getElementById('pop-mycase-link');
        console.log('[ScreenPop] MyCase URL debug:', {
            client_id: data.client_id,
            mycase_url: data.mycase_url,
            mycase_url_type: typeof data.mycase_url,
        });
        if (data.client_id) {
            const finalUrl = data.mycase_url || `https://app.mycase.com/contacts/clients/${data.client_id}`;
            console.log('[ScreenPop] Setting MyCase link to:', finalUrl);
            mycaseLink.href = finalUrl;
            mycaseLink.style.display = 'block';
        } else {
            mycaseLink.style.display = 'none';
        }

    } else {
        // --- Unknown Caller ---
        document.getElementById('pop-unknown').style.display = 'block';
        document.getElementById('pop-matched').style.display = 'none';
        document.getElementById('pop-unknown-number').textContent = data.caller_number || '';
        document.getElementById('pop-mycase-link').style.display = 'none';
    }

    // Slide in
    container.classList.add('visible');

    // Play notification sound (optional, browser-dependent)
    try {
        const audio = new Audio('data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQ==');
        audio.volume = 0.3;
        audio.play().catch(() => {});
    } catch(e) {}

    // Auto-dismiss timer
    clearTimeout(screenPopDismissTimer);
    screenPopDismissTimer = setTimeout(dismissScreenPop, SCREEN_POP_TIMEOUT_MS);
}

function dismissScreenPop() {
    clearTimeout(screenPopDismissTimer);
    document.getElementById('screen-pop-container').classList.remove('visible');
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// Initialize SSE on page load
document.addEventListener('DOMContentLoaded', function() {
    // Only connect if user is logged in (check for a known element)
    if (document.querySelector('[data-authenticated="true"]')) {
        initScreenPopSSE();
    }
});

// Clean up on page unload
window.addEventListener('beforeunload', function() {
    if (screenPopEventSource) {
        screenPopEventSource.close();
    }
});
</script>
